name: "\u2795 Feature request"
description: "Have an idea to make Linkdirecte better? We'd love to hear it."
title: "[\u2795] "
labels: ["enhancement"]
assignees:
  - Adouchee

body:
  - type: markdown
    attributes:
      value: |
        ## Thanks for your idea! \u2728

        All ideas are welcome — big or small, rough or refined. If it would make Linkdirecte better for you, it's worth sharing.

  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      description: Describe the feature or improvement you have in mind.
      placeholder: "e.g. A way to export my links as a JSON file."
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Why is this useful?
      description: What problem does it solve? What's your workflow like without it?
      placeholder: "e.g. I often need to back up my links, but there's no way to do that today."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Have you found a workaround or thought of another way to solve this?
      placeholder: "e.g. I tried manually copying links from the page, but it's tedious."
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, examples from other tools, related issues — anything that helps us understand your vision.
      placeholder: "e.g. Similar to how Notion lets you export pages as Markdown."
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I checked that this hasn't already been requested or implemented
          required: false
